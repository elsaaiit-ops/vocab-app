<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#2563eb" />
  <title>單字練習</title>
  <link rel="manifest" href="./manifest.json" />
  <link rel="icon" type="image/png" href="./icons/icon-192.png" />
  <link rel="apple-touch-icon" href="./icons/icon-192.png" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <header id="auth-bar">
    <div class="left">
      <strong>單字練習</strong>
    </div>
    <div class="right">
      <span id="sync-indicator" class="muted">⚪ 載入中…</span>
      <button id="auth-btn" class="btn ghost">登入</button>
    </div>
  </header>

  <main id="view"></main>

  <nav id="tabs">
    <button data-tab="dashboard"><span class="icon">📊</span><span>儀表板</span></button>
    <button data-tab="add"><span class="icon">➕</span><span>新增</span></button>
    <button data-tab="words"><span class="icon">📚</span><span>我的單字</span></button>
    <button data-tab="practice"><span class="icon">✏️</span><span>練習</span></button>
    <button data-tab="backup"><span class="icon">💾</span><span>備份</span></button>
  </nav>

  <script type="module" src="./app.js"></script>
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("./sw.js").catch((e) =>
          console.warn("[sw] register failed", e)
        );
      });
    }
  </script>
</body>
</html>
